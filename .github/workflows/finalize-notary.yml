name: Finalize Notarization (Wait + Staple + Re-upload)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.5-rc5)"
        required: true
        type: string
      platform:
        description: "Platform suffix"
        required: true
        type: choice
        options:
          - macos-arm64
          - macos-x86_64
      submission_id:
        description: "Apple notary Submission ID (UUID)"
        required: true
        type: string
      wait_timeout_minutes:
        description: "How long to wait (minutes) before giving up"
        required: false
        default: "360"
        type: string

permissions:
  contents: write

jobs:
  finalize:
    name: Finalize (${{ inputs.platform }})
    runs-on: macos-14
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Confirm inputs
        shell: bash
        run: |
          set -euo pipefail
          echo "Tag: ${{ inputs.tag }}"
          echo "Platform: ${{ inputs.platform }}"
          echo "Submission ID: ${{ inputs.submission_id }}"
          echo "Timeout minutes: ${{ inputs.wait_timeout_minutes }}"

      - name: Prepare Apple API key (p8)
        shell: bash
        run: |
          set -euo pipefail
          echo "$APPLE_NOTARY_KEY_P8_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_NOTARY_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_KEY_P8_B64 }}

      - name: Wait for notarization to finish (poll info)
        shell: bash
        env:
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          SUB_ID="${{ inputs.submission_id }}"
          MAX_MIN="${{ inputs.wait_timeout_minutes }}"
          MAX_SEC=$((MAX_MIN * 60))
          SLEEP_SEC=60

          START_TS="$(date +%s)"
          echo "Polling notary status every ${SLEEP_SEC}s (max ${MAX_MIN} minutes)..."

          while true; do
            NOW_TS="$(date +%s)"
            ELAPSED=$((NOW_TS - START_TS))

            if [ $ELAPSED -ge $MAX_SEC ]; then
              echo "Timed out after ${ELAPSED}s."
              echo "Last known info:"
              xcrun notarytool info "$SUB_ID" \
                --issuer "$APPLE_NOTARY_ISSUER_ID" \
                --key-id "$APPLE_NOTARY_KEY_ID" \
                --key "$RUNNER_TEMP/AuthKey.p8" \
                --team-id "$APPLE_TEAM_ID" \
                --output-format json || true
              exit 124
            fi

            set +e
            OUT="$(xcrun notarytool info "$SUB_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json 2>&1)"
            STATUS=$?
            set -e

            echo "$OUT"

            # Retry transient network issues
            if [ $STATUS -ne 0 ]; then
              if echo "$OUT" | grep -qiE "offline|NSURLErrorDomain|No network route|timed out|could not connect"; then
                echo "Transient network error. Sleeping ${SLEEP_SEC}s..."
                sleep "$SLEEP_SEC"
                continue
              fi
              echo "Non-network error while checking notary status."
              exit $STATUS
            fi

            export OUT
            NOTARY_STATUS="$(python3 - <<'PY'
import os, json, re, sys

s = os.environ.get("OUT","")

# Extract first JSON object found in the output
m = re.search(r'\{.*\}', s, flags=re.DOTALL)
if not m:
    # Not JSON yet — treat as transient
    print("")
    sys.exit(0)

try:
    j = json.loads(m.group(0))
except Exception:
    print("")
    sys.exit(0)

print(j.get("status",""))
PY
            )"

            # If we couldn't parse JSON cleanly, don't hard-fail — just wait and retry
            if [ -z "${NOTARY_STATUS:-}" ]; then
              echo "Could not parse JSON status from notarytool output. Sleeping ${SLEEP_SEC}s..."
              sleep "$SLEEP_SEC"
              continue
            fi

            if [ "$NOTARY_STATUS" = "Accepted" ]; then
              echo "Notarization Accepted."
              break
            fi

            if [ "$NOTARY_STATUS" = "Invalid" ] || [ "$NOTARY_STATUS" = "Rejected" ]; then
              echo "Notarization finished with status: $NOTARY_STATUS"
              echo "Fetching notary log:"
              xcrun notarytool log "$SUB_ID" \
                --issuer "$APPLE_NOTARY_ISSUER_ID" \
                --key-id "$APPLE_NOTARY_KEY_ID" \
                --key "$RUNNER_TEMP/AuthKey.p8" \
                --team-id "$APPLE_TEAM_ID" || true
              exit 1
            fi

            echo "Still processing (status=$NOTARY_STATUS). Sleeping ${SLEEP_SEC}s..."
            sleep "$SLEEP_SEC"
          done

      - name: Download release ZIP asset for this platform
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          PLATFORM="${{ inputs.platform }}"
          ZIP="head_tracked_view_assist_${TAG}_${PLATFORM}.zip"

          echo "Downloading release asset: $ZIP"
          gh release download "$TAG" --pattern "$ZIP" --clobber
          ls -la

      - name: Unzip, staple tracker.app, verify
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          PLATFORM="${{ inputs.platform }}"
          ZIP="head_tracked_view_assist_${TAG}_${PLATFORM}.zip"

          rm -rf workdir
          mkdir -p workdir
          unzip -q "$ZIP" -d workdir

          APP_PATH="workdir/head_tracked_view_assist/tracker/tracker.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: tracker.app not found at: $APP_PATH"
            echo "Listing extracted tree (first 5 levels):"
            find workdir -maxdepth 5 -print
            exit 1
          fi

          echo "Stapling ticket to: $APP_PATH"
          xcrun stapler staple "$APP_PATH"

          echo "Gatekeeper assessment:"
          spctl --assess --type execute --verbose=4 "$APP_PATH" || true

          echo "Codesign verification:"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Re-zip and re-upload to the Release (overwrite)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          PLATFORM="${{ inputs.platform }}"
          ZIP="head_tracked_view_assist_${TAG}_${PLATFORM}.zip"

          echo "Repacking $ZIP..."
          rm -f "$ZIP"
          (cd workdir && zip -qr "../$ZIP" head_tracked_view_assist)

          echo "Uploading (overwrite) to release $TAG..."
          gh release upload "$TAG" "$ZIP" --clobber

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Finalize Notarization Complete"
            echo ""
            echo "- Tag: ${{ inputs.tag }}"
            echo "- Platform: ${{ inputs.platform }}"
            echo "- Submission ID: ${{ inputs.submission_id }}"
            echo "- Action: Downloaded release zip, stapled tracker.app, re-uploaded zip (overwritten)."
          } >> "$GITHUB_STEP_SUMMARY"
