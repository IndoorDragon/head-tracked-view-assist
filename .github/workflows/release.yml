name: Release (Build + Upload Assets)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build + Upload (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            artifact_suffix: windows
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - name: macos-arm64
            os: macos-latest
            artifact_suffix: macos-arm64
          - name: macos-x86_64
            os: macos-15-intel
            artifact_suffix: macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build tracker with PyInstaller
        run: |
          python -m PyInstaller --noconfirm tracker.spec

      - name: Debug - show dist contents
        shell: bash
        run: |
          echo "dist listing:"
          ls -la dist || true
          echo "dist/tracker listing (if present):"
          ls -la dist/tracker || true

      - name: Package Blender add-on zip (correct Blender structure)
        shell: bash
        run: |
          python - << 'PY'
          import os, shutil, zipfile
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "untagged")
          platform = os.environ["PLATFORM_SUFFIX"]

          # IMPORTANT: Blender requires __init__.py inside a folder in the ZIP.
          addon_root_name = "head_tracked_view_assist"

          repo = Path(".").resolve()
          out_dir = repo / "release_out"
          stage = repo / "release_stage"

          shutil.rmtree(out_dir, ignore_errors=True)
          shutil.rmtree(stage, ignore_errors=True)
          out_dir.mkdir(parents=True, exist_ok=True)
          stage.mkdir(parents=True, exist_ok=True)

          addon_root = stage / addon_root_name
          addon_root.mkdir(parents=True, exist_ok=True)

          # 1) Copy only addon .py files into addon_root/
          addon_py = ["__init__.py","operators.py","prefs.py","props.py","ui.py","utils.py"]
          for fn in addon_py:
              src = repo / fn
              if not src.exists():
                  raise FileNotFoundError(f"Missing required add-on file: {fn}")
              shutil.copy2(src, addon_root / fn)

          # 2) Create addon_root/tracker/ and copy tracker runtime
          dist = repo / "dist"
          if not dist.exists():
              raise FileNotFoundError("dist/ not found. PyInstaller likely failed.")

          tracker_dst = addon_root / "tracker"
          tracker_dst.mkdir(parents=True, exist_ok=True)

          # Case A: PyInstaller onedir output at dist/tracker/
          dist_onedir = dist / "tracker"
          # Case B: PyInstaller onefile output at dist/tracker(.exe)
          dist_onefile_win = dist / "tracker.exe"
          dist_onefile_unix = dist / "tracker"

          if dist_onedir.exists() and dist_onedir.is_dir():
              # Copy CONTENTS of dist/tracker/ into addon_root/tracker/
              for item in dist_onedir.iterdir():
                  dst = tracker_dst / item.name
                  if item.is_dir():
                      shutil.copytree(item, dst)
                  else:
                      shutil.copy2(item, dst)
          elif dist_onefile_win.exists():
              shutil.copy2(dist_onefile_win, tracker_dst / dist_onefile_win.name)
          elif dist_onefile_unix.exists():
              shutil.copy2(dist_onefile_unix, tracker_dst / dist_onefile_unix.name)
          else:
              # Fall back: copy everything in dist into tracker/ (last resort)
              dist_items = list(dist.iterdir())
              if not dist_items:
                  raise RuntimeError("dist/ is empty. PyInstaller produced no outputs.")
              for item in dist_items:
                  dst = tracker_dst / item.name
                  if item.is_dir():
                      shutil.copytree(item, dst)
                  else:
                      shutil.copy2(item, dst)

          # 3) Include required runtime asset(s) if they live in repo/tracker/
          # (Common: face_landmarker.task)
          maybe_task = repo / "tracker" / "face_landmarker.task"
          if maybe_task.exists():
              shutil.copy2(maybe_task, tracker_dst / maybe_task.name)

          # 4) Zip it with correct folder structure
          zip_name = f"head_tracked_view_assist_{tag}_{platform}.zip"
          zip_path = out_dir / zip_name

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for p in stage.rglob("*"):
                  z.write(p, p.relative_to(stage))

          print(f"Created: {zip_path}")
          PY
        env:
          PLATFORM_SUFFIX: ${{ matrix.artifact_suffix }}

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_out/*.zip