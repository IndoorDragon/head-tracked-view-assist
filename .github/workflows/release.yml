name: Release (Build + Upload Assets)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build + Upload (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            artifact_suffix: windows
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - name: macos-arm64
            os: macos-latest
            artifact_suffix: macos-arm64
          - name: macos-x86_64
            os: macos-13
            artifact_suffix: macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # If you have OS/arch-specific install/pins, keep them here (like your mediapipe pin)
      # - name: OS-specific pins (example)
      #   run: pip install "mediapipe==0.10.21"

      - name: Build tracker with PyInstaller
        run: |
          python -m PyInstaller --noconfirm tracker.spec

      - name: Package Blender add-on zip
        shell: bash
        run: |
          python - << 'PY'
          import os, shutil, zipfile, sys
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]  # like v0.1.4
          platform = os.environ["PLATFORM_SUFFIX"]

          repo = Path(".").resolve()
          out_dir = repo / "release_out"
          stage = repo / "release_stage"

          # clean
          shutil.rmtree(out_dir, ignore_errors=True)
          shutil.rmtree(stage, ignore_errors=True)
          out_dir.mkdir(parents=True, exist_ok=True)
          stage.mkdir(parents=True, exist_ok=True)

          # 1) Copy only the addon .py files into root of stage
          addon_py = ["__init__.py","operators.py","prefs.py","props.py","ui.py","utils.py"]
          for fn in addon_py:
            shutil.copy2(repo / fn, stage / fn)

          # 2) Put the built tracker inside stage/tracker/
          # Adjust these paths if your spec outputs differently.
          # Common PyInstaller outputs:
          # - onefile: dist/<name>(.exe)
          # - onedir:  dist/<name>/...
          dist = repo / "dist"
          tracker_dst = stage / "tracker"
          tracker_dst.mkdir(parents=True, exist_ok=True)

          # Heuristic: copy everything in dist/ into tracker/
          # (This works for both onefile and onedir outputs.)
          for item in dist.iterdir():
            if item.is_dir():
              shutil.copytree(item, tracker_dst / item.name)
            else:
              shutil.copy2(item, tracker_dst / item.name)

          # Optional: if you want per-platform subfolder (prevents name collisions)
          # Uncomment this block if you prefer:
          #
          # tmp = stage / "tracker_tmp"
          # if tracker_dst.exists():
          #   tracker_dst.rename(tmp)
          # plat_dir = stage / "tracker" / platform
          # plat_dir.mkdir(parents=True, exist_ok=True)
          # shutil.move(str(tmp), str(plat_dir / "build"))

          # 3) Zip it
          zip_name = f"head_tracked_view_assist_{tag}_{platform}.zip"
          zip_path = out_dir / zip_name

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
            for p in stage.rglob("*"):
              z.write(p, p.relative_to(stage))

          print(f"Created: {zip_path}")
          PY
        env:
          PLATFORM_SUFFIX: ${{ matrix.artifact_suffix }}

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_out/*.zip