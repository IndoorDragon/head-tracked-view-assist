name: Release (Build + Upload Assets)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build + Upload (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            artifact_suffix: windows
            python_version: "3.11"
            mediapipe_version: "0.10.32"

          - name: linux-x86_64
            os: ubuntu-latest
            artifact_suffix: linux-x86_64
            python_version: "3.11"
            mediapipe_version: "0.10.32"

          - name: macos-arm64
            os: macos-14
            artifact_suffix: macos-arm64
            python_version: "3.11"
            mediapipe_version: "0.10.32"

          - name: macos-x86_64
            os: macos-15-intel
            artifact_suffix: macos-x86_64
            python_version: "3.10"
            mediapipe_version: "0.10.21"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Upgrade pip tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # Install requirements EXCEPT mediapipe, then install mediapipe per-platform/version
      - name: Install deps (requirements without mediapipe)
        shell: bash
        run: |
          set -euo pipefail
          python - << 'PY'
          from pathlib import Path
          src = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          out = []
          for line in src:
            s = line.strip()
            if not s or s.startswith("#"):
              out.append(line)
              continue
            if s.lower().startswith("mediapipe"):
              print("Stripping from requirements:", line)
              continue
            out.append(line)
          Path("requirements.no_mediapipe.txt").write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          python -m pip install -r requirements.no_mediapipe.txt
          python -m pip install "mediapipe==${{ matrix.mediapipe_version }}"

      - name: Build tracker with PyInstaller (spec)
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean tracker.spec

      - name: Debug - show dist contents
        shell: bash
        run: |
          echo "dist listing:"
          ls -la dist || true
          echo "dist/tracker listing (if present):"
          ls -la dist/tracker || true
          echo "dist/tracker.app listing (if present):"
          ls -la dist/tracker.app || true

      # ---------------- macOS SIGN + NOTARIZE (ASYNC) ----------------

      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="temp_pw"

          echo "$MACOS_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"

          security list-keychains -d user -s "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN" || true
        env:
          MACOS_CERT_P12_B64: ${{ secrets.MACOS_CERT_P12_B64 }}
          MACOS_CERT_P12_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}

      - name: Codesign tracker.app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP="dist/tracker.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Expected $APP to exist. Your spec may not be producing a .app."
            ls -la dist || true
            exit 1
          fi

          echo "Signing: $APP"
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" \
            "$APP"

          echo "Verifying signature..."
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose=4 "$APP" || true
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}

      - name: Submit to Apple notarization (async, macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP="dist/tracker.app"
          echo "$APPLE_NOTARY_KEY_P8_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

          echo "Creating notarization ZIP..."
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/tracker-notary.zip"

          echo "Submitting to Apple notarization (NO WAIT)..."
          SUB_ID="$(
            xcrun notarytool submit "$RUNNER_TEMP/tracker-notary.zip" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json \
            | python -c "import sys, json; print(json.load(sys.stdin)['id'])"
          )"

          echo "Notary Submission ID: $SUB_ID"

          mkdir -p notary_out
          {
            echo "tag=${GITHUB_REF_NAME}"
            echo "platform=${PLATFORM_SUFFIX}"
            echo "submission_id=${SUB_ID}"
          } > "notary_out/notary-${PLATFORM_SUFFIX}.txt"

          {
            echo "## Apple Notary Submission"
            echo ""
            echo "- Tag: \`${GITHUB_REF_NAME}\`"
            echo "- Platform: \`${PLATFORM_SUFFIX}\`"
            echo "- Submission ID: \`${SUB_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PLATFORM_SUFFIX: ${{ matrix.artifact_suffix }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_KEY_P8_B64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload notarization submission info (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: notary-submission-${{ matrix.artifact_suffix }}
          path: notary_out/notary-${{ matrix.artifact_suffix }}.txt

      # ---------------- Stage Blender add-on folder (ALL platforms) ----------------

      - name: Stage Blender add-on folder (correct Blender structure)
        shell: bash
        run: |
          python - << 'PY'
          import os, shutil
          from pathlib import Path

          addon_root_name = "head_tracked_view_assist"

          repo = Path(".").resolve()
          stage = repo / "release_stage"
          out_dir = repo / "release_out"

          shutil.rmtree(stage, ignore_errors=True)
          shutil.rmtree(out_dir, ignore_errors=True)
          stage.mkdir(parents=True, exist_ok=True)
          out_dir.mkdir(parents=True, exist_ok=True)

          addon_root = stage / addon_root_name
          addon_root.mkdir(parents=True, exist_ok=True)

          # 1) Copy add-on .py files
          addon_py = ["__init__.py","operators.py","prefs.py","props.py","ui.py","utils.py"]
          for fn in addon_py:
              src = repo / fn
              if not src.exists():
                  raise FileNotFoundError(f"Missing required add-on file: {fn}")
              shutil.copy2(src, addon_root / fn)

          # 2) Create addon_root/tracker/ and copy tracker runtime
          dist = repo / "dist"
          if not dist.exists():
              raise FileNotFoundError("dist/ not found. PyInstaller likely failed.")

          tracker_dst = addon_root / "tracker"
          tracker_dst.mkdir(parents=True, exist_ok=True)

          dist_app = dist / "tracker.app"
          dist_onedir = dist / "tracker"
          dist_onefile_win = dist / "tracker.exe"
          dist_onefile_unix = dist / "tracker"

          if dist_app.exists() and dist_app.is_dir():
              dst = tracker_dst / "tracker.app"
              if dst.exists():
                  shutil.rmtree(dst)
              shutil.copytree(dist_app, dst, symlinks=True)
          elif dist_onedir.exists() and dist_onedir.is_dir():
              for item in dist_onedir.iterdir():
                  dst = tracker_dst / item.name
                  if item.is_dir():
                      shutil.copytree(item, dst, symlinks=True)
                  else:
                      shutil.copy2(item, dst)
          elif dist_onefile_win.exists():
              shutil.copy2(dist_onefile_win, tracker_dst / dist_onefile_win.name)
          elif dist_onefile_unix.exists():
              shutil.copy2(dist_onefile_unix, tracker_dst / dist_onefile_unix.name)
          else:
              dist_items = list(dist.iterdir())
              if not dist_items:
                  raise RuntimeError("dist/ is empty. PyInstaller produced no outputs.")
              for item in dist_items:
                  dst = tracker_dst / item.name
                  if item.is_dir():
                      shutil.copytree(item, dst, symlinks=True)
                  else:
                      shutil.copy2(item, dst)

          # 3) Include model file if present in repo/tracker/
          maybe_task = repo / "tracker" / "face_landmarker.task"
          if maybe_task.exists():
              shutil.copy2(maybe_task, tracker_dst / maybe_task.name)

          # Helpful debug manifest
          manifest = repo / "release_out" / "zip_manifest.txt"
          with manifest.open("w", encoding="utf-8") as f:
              for p in sorted(stage.rglob("*")):
                  f.write(str(p.relative_to(stage)) + ("\n" if not p.is_dir() else "/\n"))

          print("Staged:", stage)
          PY

      # ---------------- ZIP (macOS uses ditto) ----------------

      - name: Zip add-on (macOS, preserve .app bundle)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PLATFORM="${{ matrix.artifact_suffix }}"
          ZIP="head_tracked_view_assist_${TAG}_${PLATFORM}.zip"

          rm -f "release_out/$ZIP"

          # IMPORTANT: ditto preserves symlinks/resource forks in .app bundles
          ditto -c -k --sequesterRsrc --keepParent \
            "release_stage/head_tracked_view_assist" \
            "release_out/$ZIP"

          ls -la "release_out/$ZIP"
          echo "Wrote release_out/$ZIP"

      - name: Zip add-on (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          python - << 'PY'
          import os, zipfile
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "untagged")
          platform = os.environ["PLATFORM_SUFFIX"]

          stage = Path("release_stage")
          out_dir = Path("release_out")
          zip_name = f"head_tracked_view_assist_{tag}_{platform}.zip"
          zip_path = out_dir / zip_name

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for p in stage.rglob("*"):
                  z.write(p, p.relative_to(stage))

          print(f"Created: {zip_path}")
          PY
        env:
          PLATFORM_SUFFIX: ${{ matrix.artifact_suffix }}

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_out/*.zip