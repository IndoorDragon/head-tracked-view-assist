name: Build tracker (Win/Mac/Linux)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # required to upload assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller (spec)
        run: |
          pyinstaller --noconfirm --clean tracker.spec

      # Package per-OS into a single archive so it's easy to attach to the release
      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -Command "Compress-Archive -Path dist\\tracker\\* -DestinationPath tracker-windows.zip"

      - name: Create archive (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../tracker-${{ runner.os }}.tar.gz tracker

      # Upload archives to the GitHub Release that triggered this workflow
      - name: Upload release assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-windows.zip

      - name: Upload release assets (macOS/Linux)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-${{ runner.os }}.tar.gz