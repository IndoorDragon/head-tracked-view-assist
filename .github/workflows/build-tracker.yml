name: Build tracker (Win/Mac/Linux)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug — show repo files (cross-platform)
        run: |
          python -c "import sys, os; print('Python:', sys.version); print('CWD:', os.getcwd()); print('Root:', os.listdir('.')); print('tracker exists:', os.path.isdir('tracker')); print('tracker/:', os.listdir('tracker') if os.path.isdir('tracker') else 'MISSING')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Debug — show installed packages
        run: |
          python -m pip --version
          python -m pip freeze

      - name: Build with PyInstaller (spec)
        run: |
          python -m PyInstaller --noconfirm --clean tracker.spec

      # ---------------- Packaging ----------------

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -Command "Compress-Archive -Path dist\\tracker\\* -DestinationPath tracker-windows.zip"

      - name: Create archive (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../tracker-${{ runner.os }}.tar.gz tracker

      # ---------------- Always upload as workflow artifacts ----------------
      # This works for BOTH manual runs and release runs.

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-windows
          path: tracker-windows.zip

      - name: Upload artifact (macOS/Linux)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-${{ runner.os }}
          path: tracker-${{ runner.os }}.tar.gz

      # ---------------- Upload to GitHub Release (ONLY when triggered by a Release tag) ----------------

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-windows.zip

      - name: Upload release assets (macOS/Linux)
        if: runner.os != 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-${{ runner.os }}.tar.gz