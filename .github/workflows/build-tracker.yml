name: Build tracker (Win/Mac/Linux)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            asset_os: Windows
            asset_arch: x86_64
            python: "3.11"

          # Linux (GitHub hosted is x86_64)
          - os: ubuntu-latest
            asset_os: Linux
            asset_arch: x86_64
            python: "3.11"

          # macOS Apple Silicon
          - os: macos-14
            asset_os: macOS
            asset_arch: arm64
            python: "3.11"

          # macOS Intel
          - os: macos-15-intel
            asset_os: macOS
            asset_arch: x86_64
            python: "3.10"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Debug — show platform + arch
        shell: bash
        run: |
          echo "Runner OS: $RUNNER_OS"
          uname -a || true
          uname -m || true
          python -c "import sys, platform; print('Python:', sys.version); print('platform.system:', platform.system()); print('platform.machine:', platform.machine())"

      - name: Debug — show repo files (cross-platform)
        shell: bash
        run: |
          python -c "import os; print('CWD:', os.getcwd()); print('Root:', os.listdir('.')); print('tracker exists:', os.path.isdir('tracker')); print('tracker/:', os.listdir('tracker') if os.path.isdir('tracker') else 'MISSING')"

      - name: Upgrade build tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # ---------------- Dependencies ----------------

      - name: Install dependencies (normal)
        if: runner.os != 'macOS' || matrix.asset_arch != 'x86_64'
        shell: bash
        run: |
          python -m pip install -r requirements.txt

      - name: Install dependencies (macOS Intel workaround)
        if: runner.os == 'macOS' && matrix.asset_arch == 'x86_64'
        shell: bash
        run: |
          echo "macOS Intel: installing all requirements EXCEPT mediapipe, then installing mediapipe explicitly."

          # Create a temp requirements file excluding any mediapipe lines (mediapipe or mediapipe-silicon, etc.)
          python - << 'PY'
          from pathlib import Path
          src = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          out = []
          for line in src:
              s = line.strip()
              # keep comments/blank lines
              if not s or s.startswith("#"):
                  out.append(line)
                  continue
              # drop mediapipe-related requirement lines
              if s.lower().startswith("mediapipe"):
                  print("Skipping:", line)
                  continue
              out.append(line)
          Path("requirements.no_mediapipe.txt").write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          python -m pip install -r requirements.no_mediapipe.txt

          # Install mediapipe explicitly (latest stable on PyPI)
          python -m pip install "mediapipe==0.10.32"

      - name: Debug — show installed packages
        shell: bash
        run: |
          python -m pip --version
          python -m pip freeze

      - name: Build with PyInstaller (spec)
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean tracker.spec

      # ---------------- Packaging ----------------

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\tracker\* -DestinationPath tracker-windows.zip

      - name: Create archive (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar -czf "../tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz" tracker

      # ---------------- Upload workflow artifacts ----------------

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-windows
          path: tracker-windows.zip

      - name: Upload artifact (macOS/Linux)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz

      # ---------------- Upload to GitHub Release (ONLY on release) ----------------

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-windows.zip

      - name: Upload release assets (macOS/Linux)
        if: runner.os != 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz