name: Build tracker (Win/Mac/Linux)

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            asset_os: Windows
            asset_arch: x86_64
            python: "3.11"
            mediapipe_version: "0.10.32"

          # Linux
          - os: ubuntu-latest
            asset_os: Linux
            asset_arch: x86_64
            python: "3.11"
            mediapipe_version: "0.10.32"

          # macOS Apple Silicon
          - os: macos-14
            asset_os: macOS
            asset_arch: arm64
            python: "3.11"
            mediapipe_version: "0.10.32"

          # macOS Intel
          - os: macos-15-intel
            asset_os: macOS
            asset_arch: x86_64
            python: "3.10"
            mediapipe_version: "0.10.21"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Prepare log folder
        shell: bash
        run: |
          mkdir -p ci_logs

      - name: Debug — show platform + arch
        shell: bash
        run: |
          {
            echo "Runner OS: $RUNNER_OS"
            echo "Matrix OS: ${{ matrix.os }}"
            echo "Asset: ${{ matrix.asset_os }}-${{ matrix.asset_arch }}"
            uname -a || true
            uname -m || true
            if command -v sw_vers >/dev/null 2>&1; then sw_vers || true; fi
            python -c "import sys, platform; print('Python:', sys.version); print('platform.system:', platform.system()); print('platform.machine:', platform.machine())"
          } | tee ci_logs/system-info.log

      - name: Debug — show repo files (cross-platform)
        shell: bash
        run: |
          python -c "import os; print('CWD:', os.getcwd()); print('Root:', os.listdir('.')); print('tracker exists:', os.path.isdir('tracker')); print('tracker/:', os.listdir('tracker') if os.path.isdir('tracker') else 'MISSING')" \
            | tee ci_logs/repo-files.log

      - name: Upgrade build tooling
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel | tee ci_logs/pip-upgrade.log

      - name: Pip debug
        shell: bash
        run: |
          python -m pip debug --verbose | tee ci_logs/pip-debug.log

      # ---------------- Dependencies ----------------
      # Install requirements EXCEPT mediapipe, then install mediapipe per-platform/version
      - name: Install deps (requirements without mediapipe) + mediapipe (matrix)
        shell: bash
        run: |
          set -euo pipefail
          echo "Installing requirements (excluding mediapipe) + mediapipe==${{ matrix.mediapipe_version }}" | tee ci_logs/pip-install.log

          python - << 'PY'
          from pathlib import Path
          src = Path("requirements.txt").read_text(encoding="utf-8").splitlines()
          out = []
          for line in src:
              s = line.strip()
              if not s or s.startswith("#"):
                  out.append(line)
                  continue
              if s.lower().startswith("mediapipe"):
                  print("Stripping:", line)
                  continue
              out.append(line)
          Path("requirements.no_mediapipe.txt").write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          python -m pip install -r requirements.no_mediapipe.txt 2>&1 | tee -a ci_logs/pip-install.log
          python -m pip install "mediapipe==${{ matrix.mediapipe_version }}" 2>&1 | tee -a ci_logs/pip-install.log

      - name: Debug — show installed packages
        shell: bash
        run: |
          {
            python -m pip --version
            python -m pip freeze
          } | tee ci_logs/pip-freeze.log

      - name: Build with PyInstaller (spec)
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --clean tracker.spec 2>&1 | tee ci_logs/pyinstaller.log

      - name: Debug — show dist outputs
        shell: bash
        run: |
          echo "dist listing:"
          ls -la dist || true
          echo "dist/tracker listing:"
          ls -la dist/tracker || true
          echo "dist/tracker.app listing:"
          ls -la dist/tracker.app || true

      # ---------------- Packaging ----------------

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\tracker\* -DestinationPath tracker-windows.zip

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd dist
          tar -czf "../tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz" tracker

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd dist
          if [ -d "tracker.app" ]; then
            tar -czf "../tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz" tracker.app
          else
            # fallback (in case spec changes)
            tar -czf "../tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz" tracker
          fi

      # ---------------- Upload build artifacts ----------------

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-windows
          path: tracker-windows.zip

      - name: Upload artifact (macOS/Linux)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz

      # ---------------- Upload logs ALWAYS (even on failure) ----------------

      - name: Upload CI logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: ci_logs

      # ---------------- Upload to GitHub Release (ONLY on release) ----------------
      - name: Upload release assets (Windows)
        if: runner.os == 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-windows.zip

      - name: Upload release assets (macOS/Linux)
        if: runner.os != 'Windows' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.tar.gz
