name: Build tracker (Win/Mac/Linux)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # required to upload assets to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Use Python 3.11 (most compatible with MediaPipe)
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ DEBUG: Confirm files exist on runner
      - name: Debug — show repo files
        run: |
          python --version
          ls -la
          ls -la tracker

      # ✅ Install dependencies safely
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # ✅ DEBUG: Show installed packages
      - name: Debug — show installed packages
        run: |
          python -m pip --version
          python -m pip freeze | sort

      # ✅ Build using spec
      - name: Build with PyInstaller (spec)
        run: |
          python -m PyInstaller --noconfirm --clean tracker.spec

      # ---------------- Packaging ----------------

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -Command "Compress-Archive -Path dist\\tracker\\* -DestinationPath tracker-windows.zip"

      - name: Create archive (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../tracker-${{ runner.os }}.tar.gz tracker

      # ---------------- Upload to Release ----------------

      - name: Upload release assets (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-windows.zip

      - name: Upload release assets (macOS/Linux)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: tracker-${{ runner.os }}.tar.gz